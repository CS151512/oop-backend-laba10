services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  web-ui:
    build:
      context: ../service/web_ui
      dockerfile: Dockerfile
    container_name: web_ui_container
    ports:
      - "${WEB_UI_PORT}:80"
    depends_on:
      - time-service
      - math-service

  time-service:
    build:
      context: ../service/time_service
      dockerfile: Dockerfile
    container_name: time_app_container
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - postgres
  math-service:
    build:
      context: ../service/math_service
      dockerfile: Dockerfile
    container_name: math_app_container
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - postgres

volumes:
  pg_data: